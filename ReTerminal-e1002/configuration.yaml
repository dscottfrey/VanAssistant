# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

command_line:
  - sensor:
      name: "SD Card Write Rate"
      command: "awk '/mmcblk0 /{print $10}' /proc/diskstats"
      unit_of_measurement: "sectors"
      scan_interval: 60

sensor:
  - platform: derivative
    source: sensor.sd_card_write_rate
    name: "SD Card Write Delta"
    unit_time: s
    time_window: "00:02:00"

recorder:
  purge_keep_days: 7
  commit_interval: 30
  include:
    entities:
      - sensor.alpstuga_air_quality_monitor_carbon_dioxide
      - sensor.alpstuga_air_quality_monitor_air_quality
      - sensor.alpstuga_air_quality_monitor_humidity
      - sensor.alpstuga_air_quality_monitor_pm2_5
      - sensor.alpstuga_air_quality_monitor_temperature
      - sensor.h5074_0725_temperature
      - sensor.h5074_0725_humidity
      - sensor.h5074_06fb_temperature
      - sensor.h5074_06fb_humidity
      - sensor.h5074_0726_temperature
      - sensor.h5074_0726_humidity
      - sensor.sd_card_write_rate
      - sensor.sd_card_write_delta
      - sensor.va_inside_high
      - sensor.va_inside_low
      - sensor.va_outside_high
      - sensor.va_outside_low
      - sensor.va_water_pump_high
      - sensor.va_water_pump_low
      - sensor.va_fridge_high
      - sensor.va_fridge_low
      - sensor.va_pi_cpu_high
      - sensor.va_pi_cpu_low

template:
  # --- GROUP 1: STATE-BASED SENSORS (YOUR EXISTING CODE) ---
  - sensor:
      - name: "Van CO2 Clean"
        unit_of_measurement: " "
        state: "{{ states('sensor.alpstuga_air_quality_monitor_carbon_dioxide') | round(0) }}"

      - name: "Indoor Air Quality Index"
        unique_id: indoor_aqi_pm25
        icon: mdi:air-filter
        unit_of_measurement: " "
        state: >
          {% set pm25 = states('sensor.alpstuga_air_quality_monitor_carbon_dioxide_pm2_5') | float(0) %}
          {% if pm25 <= 9.0 %}
            {{ ((50 - 0) / (9.0 - 0) * (pm25 - 0) + 0) | round(0) }}
          {% elif pm25 <= 35.4 %}
            {{ ((100 - 51) / (35.4 - 9.1) * (pm25 - 9.1) + 51) | round(0) }}
          {% elif pm25 <= 55.4 %}
            {{ ((150 - 101) / (55.4 - 35.5) * (pm25 - 35.5) + 101) | round(0) }}
          {% elif pm25 <= 125.4 %}
            {{ ((200 - 151) / (125.4 - 55.5) * (pm25 - 125.5) + 151) | round(0) }}
          {% elif pm25 <= 225.4 %}
            {{ ((300 - 201) / (225.4 - 125.5) * (pm25 - 125.5) + 201) | round(0) }}
          {% else %}
            {{ ((500 - 301) / (500.4 - 225.5) * (pm25 - 225.5) + 301) | round(0) }}
          {% endif %}
        attributes:
          severity: >
            {% set aqi = this.state | int(0) %}
            {% if aqi <= 50 %} Good
            {% elif aqi <= 100 %} Moderate
            {% elif aqi <= 150 %} Unhealthy for Sensitive Groups
            {% elif aqi <= 200 %} Unhealthy
            {% elif aqi <= 300 %} Very Unhealthy
            {% else %} Hazardous
            {% endif %}
          co2_status: >
            {% set co2 = states('sensor.alpstuga_air_quality_monitor_carbon_dioxide') | float(0) %}
            {% if co2 < 800 %} Fresh
            {% elif co2 < 1200 %} Stuffy
            {% else %} Poor Ventilation
            {% endif %}

      - name: "Van Dashboard Battery Percent"
        unique_id: van_reterminal_battery_pct
        unit_of_measurement: "%"
        device_class: battery
        state: >
          {% set raw_val = states('sensor.reterminal_e1002_battery_voltage') %}
          {% if raw_val | is_number %}
            {% set voltage = raw_val | float %}
            {% if voltage >= 4.2 %} 100
            {% elif voltage <= 3.2 %} 0
            {% else %} {{ ((voltage - 3.2) / (4.2 - 3.2) * 100) | round(0) }}
            {% endif %}
          {% else %}
            {{ states('sensor.van_dashboard_battery_percent') }}
          {% endif %}

  # --- GROUP 2: TRIGGER-BASED HIGH/LOW (UPDATED TO 11PM RESET) ---
  - trigger:
      - platform: time_pattern
        minutes: "/5"
      - platform: time
        at: "06:00:00" # Daily High Reset
      - platform: time
        at: "23:00:00" # Daily Low Reset (11:00 PM)
    sensor:
      - name: "VA Inside High"
        unique_id: va_inside_temp_high
        unit_of_measurement: "°F"
        device_class: temperature
        state: >
          {% set cur = states('sensor.alpstuga_air_quality_monitor_temperature') | float(none) %}
          {% set old = states('sensor.va_inside_high') | float(-99) %}
          {{ cur if (now().hour == 6 and now().minute < 5) or (cur > old) else old }}

      - name: "VA Inside Low"
        unique_id: va_inside_temp_low
        unit_of_measurement: "°F"
        device_class: temperature
        state: >
          {% set cur = states('sensor.alpstuga_air_quality_monitor_temperature') | float(none) %}
          {% set old = states('sensor.va_inside_low') | float(999) %}
          {{ cur if (now().hour == 23 and now().minute < 5) or (cur < old) else old }}

      - name: "VA Outside High"
        unique_id: va_outside_temp_high
        unit_of_measurement: "°F"
        device_class: temperature
        state: >
          {% set cur = states('sensor.h5074_0726_temperature') | float(none) %}
          {% set old = states('sensor.va_outside_high') | float(-99) %}
          {{ cur if (now().hour == 6 and now().minute < 5) or (cur > old) else old }}

      - name: "VA Outside Low"
        unique_id: va_outside_temp_low
        unit_of_measurement: "°F"
        device_class: temperature
        state: >
          {% set cur = states('sensor.h5074_0726_temperature') | float(none) %}
          {% set old = states('sensor.va_outside_low') | float(999) %}
          {{ cur if (now().hour == 23 and now().minute < 5) or (cur < old) else old }}

      - name: "VA Water Pump High"
        unique_id: va_water_pump_temp_high
        unit_of_measurement: "°F"
        device_class: temperature
        state: >
          {% set cur = states('sensor.h5074_06fb_temperature') | float(none) %}
          {% set old = states('sensor.va_water_pump_high') | float(-99) %}
          {{ cur if (now().hour == 6 and now().minute < 5) or (cur > old) else old }}

      - name: "VA Water Pump Low"
        unique_id: va_water_pump_temp_low
        unit_of_measurement: "°F"
        device_class: temperature
        state: >
          {% set cur = states('sensor.h5074_06fb_temperature') | float(none) %}
          {% set old = states('sensor.va_water_pump_low') | float(999) %}
          {{ cur if (now().hour == 23 and now().minute < 5) or (cur < old) else old }}

      - name: "VA Fridge High"
        unique_id: va_fridge_temp_high
        unit_of_measurement: "°F"
        device_class: temperature
        state: >
          {% set cur = states('sensor.h5074_0725_temperature') | float(none) %}
          {% set old = states('sensor.va_fridge_high') | float(-99) %}
          {{ cur if (now().hour == 6 and now().minute < 5) or (cur > old) else old }}

      - name: "VA Fridge Low"
        unique_id: va_fridge_temp_low
        unit_of_measurement: "°F"
        device_class: temperature
        state: >
          {% set cur = states('sensor.h5074_0725_temperature') | float(none) %}
          {% set old = states('sensor.va_fridge_low') | float(999) %}
          {{ cur if (now().hour == 23 and now().minute < 5) or (cur < old) else old }}

      - name: "VA Pi CPU High"
        unique_id: va_pi_cpu_temp_high
        unit_of_measurement: "°F"
        device_class: temperature
        state: >
          {% set cur = states('sensor.system_monitor_processor_temperature') | float(none) %}
          {% set old = states('sensor.va_pi_cpu_high') | float(-99) %}
          {{ cur if (now().hour == 6 and now().minute < 5) or (cur > old) else old }}

      - name: "VA Pi CPU Low"
        unique_id: va_pi_cpu_temp_low
        unit_of_measurement: "°F"
        device_class: temperature
        state: >
          {% set cur = states('sensor.system_monitor_processor_temperature') | float(none) %}
          {% set old = states('sensor.va_pi_cpu_low') | float(999) %}
          {{ cur if (now().hour == 23 and now().minute < 5) or (cur < old) else old }}
